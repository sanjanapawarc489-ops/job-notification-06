            return `
                <div class="job-card">
                    <div class="job-header">
                        <div>
                            <h3 class="job-title">${job.title}</h3>
                            <p class="job-company">${job.company}</p>
                        </div>
                        ${prefs ? `<div style="background-color: ${scoreColor.bg}; padding: 8px 12px; border-radius: 4px; text-align: center; min-width: 60px;">
                            <div style="font-size: 18px; font-weight: 700; color: ${scoreColor.color};">${matchScore}</div>
                            <div style="font-size: 11px; color: ${scoreColor.color}; font-weight: 500;">match</div>
                        </div>` : ''}
                    </div>
                    <div class="job-meta">
                        <span class="job-badge">${job.location}</span>
                        <span class="job-badge">${job.mode}</span>
                        <span class="job-badge">${job.experience}</span>
                        <span class="job-badge job-source-badge">${job.source}</span>
                    </div>
                    <p class="job-salary">${job.salaryRange}</p>
                    <p style="font-size: 13px; color: var(--color-text-tertiary); margin: 0;">${job.postedDaysAgo} days ago</p>
                    
                    <!-- Status Button Group -->
                    <div class="status-button-group">
                        <button class="status-button ${currentStatus === 'Not Applied' ? getStatusClass('Not Applied') : ''}" onclick="updateJobStatus(${job.id}, 'Not Applied')">Not Applied</button>
                        <button class="status-button ${currentStatus === 'Applied' ? getStatusClass('Applied') : ''}" onclick="updateJobStatus(${job.id}, 'Applied')">Applied</button>
                        <button class="status-button ${currentStatus === 'Rejected' ? getStatusClass('Rejected') : ''}" onclick="updateJobStatus(${job.id}, 'Rejected')">Rejected</button>
                        <button class="status-button ${currentStatus === 'Selected' ? getStatusClass('Selected') : ''}" onclick="updateJobStatus(${job.id}, 'Selected')">Selected</button>
                    </div>

                    <div class="job-actions">
                        <button class="btn-view" onclick="openJobModal(${job.id})">View</button>
                        <button class="btn-save ${saved ? 'saved' : ''}" onclick="saveJob(${job.id}, event)">${saved ? '✓ Saved' : 'Save'}</button>
                        <button class="btn-apply" onclick="window.open('${job.applyUrl}', '_blank')">Apply</button>
                    </div>
                </div>
            `;
        }

        function updateJobStatus(jobId, status) {
            setJobStatus(jobId, status);
            showToast(`Status updated: ${status}`);
            renderDashboardPage();
        }

        function openJobModal(jobId) {
            const job = JOBS_DATASET.find(j => j.id === jobId);
            if (!job) return;

            const saved = isSaved(jobId);
            const modal = document.getElementById('jobModal');
            const modalContent = document.getElementById('modalContent');

            modalContent.innerHTML = `
                <div class="modal-header">
                    <div>
                        <h2 class="modal-title">${job.title}</h2>
                        <p class="modal-subtitle">${job.company}</p>
                    </div>
                    <button class="modal-close" onclick="closeJobModal()">✕</button>
                </div>

                <div class="modal-section">
                    <div class="modal-section-title">Position Details</div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-2); font-size: 14px; margin-bottom: var(--space-2);">
                        <div><strong>Location:</strong> ${job.location}</div>
                        <div><strong>Mode:</strong> ${job.mode}</div>
                        <div><strong>Experience:</strong> ${job.experience}</div>
                        <div><strong>Source:</strong> ${job.source}</div>
                    </div>
                </div>

                <div class="modal-section">
                    <div class="modal-section-title">Salary</div>
                    <p class="modal-description" style="font-size: 16px; font-weight: 600; color: var(--color-accent);">${job.salaryRange}</p>
                </div>

                <div class="modal-section">
                    <div class="modal-section-title">Description</div>
                    <p class="modal-description">${job.description}</p>
                </div>

                <div class="modal-section">
                    <div class="modal-section-title">Required Skills</div>
                    <div class="modal-tags">
                        ${job.skills.map(skill => `<span class="modal-tag">${skill}</span>`).join('')}
                    </div>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-save ${saved ? 'saved' : ''}" onclick="saveJob(${job.id}, event); closeJobModal();" style="border: 1px solid var(--color-border); background: transparent; color: var(--color-accent);">${saved ? '✓ Saved' : 'Save Job'}</button>
                    <button class="btn btn-primary" onclick="window.open('${job.applyUrl}', '_blank')">Apply Now</button>
                </div>
            `;

            modal.classList.add('active');
        }

        function closeJobModal() {
            document.getElementById('jobModal').classList.remove('active');
        }

        function saveJob(jobId, event) {
            event.stopPropagation();
            toggleSaveJob(jobId);
            
            // Update button state
            const buttons = document.querySelectorAll(`[onclick*="saveJob(${jobId}"]`);
            buttons.forEach(btn => {
                if (isSaved(jobId)) {
                    btn.classList.add('saved');
                    btn.textContent = '✓ Saved';
                } else {
                    btn.classList.remove('saved');
                    btn.textContent = 'Save';
                }
            });
        }

        function renderFilterBar() {
            const locations = getUniqueValues('location');
            const modes = getUniqueValues('mode');
            const experiences = getUniqueValues('experience');
            const sources = getUniqueValues('source');
            const prefs = parsePreferences();

            return `
                <div class="filter-bar" style="grid-template-columns: repeat(7, 1fr);">
                    <div class="filter-group">
                        <label class="filter-label">Search</label>
                        <input type="text" class="filter-input" placeholder="Job title, company..." id="searchFilter" value="${filterState.search}" onchange="updateFilter('search', this.value); renderDashboardPage();">
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Location</label>
                        <select class="filter-select" id="locationFilter" onchange="updateFilter('location', this.value); renderDashboardPage();">
                            <option value="">All Locations</option>
                            ${locations.map(loc => `<option value="${loc}" ${filterState.location === loc ? 'selected' : ''}>${loc}</option>`).join('')}
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Mode</label>
                        <select class="filter-select" id="modeFilter" onchange="updateFilter('mode', this.value); renderDashboardPage();">
                            <option value="">All Modes</option>
                            ${modes.map(mode => `<option value="${mode}" ${filterState.mode === mode ? 'selected' : ''}>${mode}</option>`).join('')}
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Experience</label>
                        <select class="filter-select" id="experienceFilter" onchange="updateFilter('experience', this.value); renderDashboardPage();">
                            <option value="">All Levels</option>
                            ${experiences.map(exp => `<option value="${exp}" ${filterState.experience === exp ? 'selected' : ''}>${exp}</option>`).join('')}
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Source</label>
                        <select class="filter-select" id="sourceFilter" onchange="updateFilter('source', this.value); renderDashboardPage();">
                            <option value="">All Sources</option>
                            ${sources.map(src => `<option value="${src}" ${filterState.source === src ? 'selected' : ''}>${src}</option>`).join('')}
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Status</label>
                        <select class="filter-select" id="statusFilter" onchange="updateFilter('status', this.value); renderDashboardPage();">
                            <option value="">All Status</option>
                            <option value="Not Applied" ${filterState.status === 'Not Applied' ? 'selected' : ''}>Not Applied</option>
                            <option value="Applied" ${filterState.status === 'Applied' ? 'selected' : ''}>Applied</option>
                            <option value="Rejected" ${filterState.status === 'Rejected' ? 'selected' : ''}>Rejected</option>
                            <option value="Selected" ${filterState.status === 'Selected' ? 'selected' : ''}>Selected</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">Sort</label>
                        <select class="filter-select" id="sortFilter" onchange="updateFilter('sort', this.value); renderDashboardPage();">
                            <option value="latest" ${filterState.sort === 'latest' ? 'selected' : ''}>Latest First</option>
                            <option value="oldest" ${filterState.sort === 'oldest' ? 'selected' : ''}>Oldest First</option>
                            ${prefs ? `<option value="match" ${filterState.sort === 'match' ? 'selected' : ''}>Match Score</option>` : ''}
                            <option value="salary" ${filterState.sort === 'salary' ? 'selected' : ''}>Salary (High)</option>
                        </select>
                    </div>
                </div>
                ${prefs ? `
                <div style="padding: 0 var(--space-4) var(--space-2); display: flex; align-items: center; gap: var(--space-2);">
                    <label style="display: flex; align-items: center; gap: var(--space-1); cursor: pointer; font-weight: 500; margin: 0;">
                        <input type="checkbox" id="showOnlyMatches" ${filterState.showOnlyMatches ? 'checked' : ''} onchange="updateFilter('showOnlyMatches', this.checked); renderDashboardPage();" style="cursor: pointer; width: 18px; height: 18px;">
                        <span>Show only jobs above my threshold (${(getPreferences() || {}).minMatchScore || 40})</span>
                    </label>
                </div>
                ` : ''}
            `;
        }

        function updateFilter(key, value) {
            filterState[key] = value;
        }

        function renderDashboardPage() {
            const prefs = parsePreferences();
            const filteredJobs = filterJobs();
            
            let jobsHTML;
            if (filteredJobs.length > 0) {
                jobsHTML = `<div class="jobs-grid">${filteredJobs.map(job => renderJobCard(job)).join('')}</div>`;
            } else if (filterState.showOnlyMatches && prefs) {
                jobsHTML = `<div class="no-results"><h3>No roles match your criteria.</h3><p>Adjust your filters or lower your match score threshold to see more opportunities.</p></div>`;
            } else {
                jobsHTML = `<div class="no-results"><h3>No jobs match your search.</h3><p>Try adjusting your filters.</p></div>`;
            }

            const preferenceBanner = !prefs ? `
                <div style="background-color: #FFF3E0; border: 1px solid #B8860B; border-radius: 4px; padding: var(--space-3) var(--space-4); margin: 0 var(--space-4) var(--space-2); display: flex; align-items: center; justify-content: space-between;">
                    <div>
                        <strong style="color: #B8860B;">✨ Set your preferences to activate intelligent matching.</strong>
                        <p style="margin: var(--space-1) 0 0; color: #888888; font-size: 14px;">Configure your job preferences to see personalized match scores for each job.</p>
                    </div>
                    <a href="/settings" class="btn btn-primary" style="margin-left: var(--space-3); white-space: nowrap;">Go to Settings</a>
                </div>
            ` : '';

            return `
                <div class="context-header">
                    <h1>Dashboard</h1>
                    <p class="context-header-subtext">Explore ${JOBS_DATASET.length} opportunities in your field.</p>
                </div>
                ${preferenceBanner}
                ${renderFilterBar()}
                ${jobsHTML}
            `;
        }

        function renderSavedPage() {
            const savedJobIds = getSavedJobs();
            const savedJobs = JOBS_DATASET.filter(job => savedJobIds.includes(job.id));

            if (savedJobs.length === 0) {
                return `
                    <div class="context-header">
                        <h1>Saved</h1>
                        <p class="context-header-subtext">Your collection of saved opportunities awaits.</p>
                    </div>
                    <div style="padding: var(--space-4);">
                        <div class="empty-state">
                            <h3>No saved jobs yet</h3>
                            <p>Save jobs from your dashboard to build your personal collection.</p>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="context-header">
                    <h1>Saved</h1>
                    <p class="context-header-subtext">${savedJobs.length} job${savedJobs.length !== 1 ? 's' : ''} saved.</p>
                </div>
                <div class="jobs-grid" style="padding: var(--space-4);">
                    ${savedJobs.map(job => renderJobCard(job)).join('')}
                </div>
            `;
        }

        function renderDigestPage() {
            const prefs = parsePreferences();
            
            if (!prefs) {
                return `
                    <div class="context-header">
                        <h1>Digest</h1>
                        <p class="context-header-subtext">Your daily summary of matched opportunities.</p>
                    </div>
                    <div style="padding: var(--space-4);">
                        <div class="empty-state">
                            <h3>Set preferences first</h3>
                            <p>Configure your job preferences to generate a personalized digest.</p>
                            <a href="/settings" class="btn btn-primary" style="margin-top: var(--space-3);">Go to Settings</a>
                        </div>
                    </div>
                `;
            }

            const digest = createDigest();
            
            if (!digest || digest.length === 0) {
                return `
                    <div class="context-header">
                        <h1>Digest</h1>
                        <p class="context-header-subtext">Your daily summary of matched opportunities.</p>
                    </div>
                    <div style="padding: var(--space-4);">
                        <div class="empty-state">
                            <h3>No matching roles today</h3>
                            <p>Check again tomorrow or adjust your preferences for more matches.</p>
                            <a href="/settings" class="btn btn-primary" style="margin-top: var(--space-3);">Adjust Preferences</a>
                        </div>
                    </div>
                `;
            }

            return `
                <div class="context-header">
                    <h1>Digest</h1>
                    <p class="context-header-subtext">Your daily 9AM digest of matched opportunities.</p>
                </div>

                <div style="padding: var(--space-4); display: flex; justify-content: center;">
                    <div style="background-color: var(--color-surface-white); border: 1px solid var(--color-border); border-radius: 4px; padding: var(--space-4); max-width: 720px; width: 100%;">
                        
                        <!-- Digest Header -->
                        <div style="text-align: center; padding-bottom: var(--space-4); border-bottom: 1px solid var(--color-border); margin-bottom: var(--space-4);">
                            <h2 style="font-family: var(--font-serif); font-size: 28px; font-weight: 700; color: var(--color-text-primary); margin: 0 0 var(--space-1) 0;">Top 10 Jobs For You</h2>
                            <p style="font-size: 16px; color: var(--color-accent); margin: 0 0 var(--space-1) 0; font-weight: 600;">9AM Digest</p>
                            <p style="font-size: 14px; color: var(--color-text-secondary); margin: 0;">${getFormattedDateString()}</p>
                        </div>

                        <!-- Job List -->
                        <div style="margin-bottom: var(--space-4);">
                            ${digest.map((job, index) => {
                                const score = job.matchScore;
                                const scoreColor = getMatchScoreBadgeColor(score);
                                return `
                                    <div style="border-bottom: 1px solid var(--color-border); padding: var(--space-3) 0; ${index === digest.length - 1 ? 'border-bottom: none;' : ''}">
                                        <div style="display: flex; justify-content: space-between; align-items: start; gap: var(--space-2); margin-bottom: var(--space-1);">
                                            <div style="flex: 1;">
                                                <h3 style="font-family: var(--font-serif); font-size: 20px; font-weight: 700; color: var(--color-text-primary); margin: 0 0 4px 0;">${index + 1}. ${job.title}</h3>
                                                <p style="font-size: 15px; font-weight: 600; color: var(--color-accent); margin: 0 0 var(--space-1) 0;">${job.company}</p>
                                            </div>
                                            <div style="background-color: ${scoreColor.bg}; padding: 8px 12px; border-radius: 4px; text-align: center; min-width: 60px; white-space: nowrap;">
                                                <div style="font-size: 16px; font-weight: 700; color: ${scoreColor.color};">${score}</div>
                                                <div style="font-size: 11px; color: ${scoreColor.color}; font-weight: 500;">match</div>
                                            </div>
                                        </div>
                                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-2); font-size: 14px; color: var(--color-text-secondary); margin-bottom: var(--space-2);">
                                            <div><strong>Location:</strong> ${job.location}</div>
                                            <div><strong>Mode:</strong> ${job.mode}</div>
                                            <div><strong>Experience:</strong> ${job.experience}</div>
                                            <div><strong>Salary:</strong> ${job.salaryRange}</div>
                                        </div>
                                        <button class="btn-apply" onclick="window.open('${job.applyUrl}', '_blank')" style="width: 100%;">Apply Now</button>
                                    </div>
                                `;
                            }).join('')}
                        </div>

                        <!-- Footer -->
                        <div style="text-align: center; padding-top: var(--space-3); border-top: 1px solid var(--color-border); color: var(--color-text-tertiary); font-size: 13px;">
                            <p style="margin: var(--space-2) 0;">This digest was generated based on your preferences.</p>
                            <p style="margin: var(--space-1) 0; color: #888888; font-style: italic;">Demo Mode: Daily 9AM trigger simulated manually.</p>
                        </div>

                        <!-- Recent Status Updates -->
                        ${getStatusUpdates().length > 0 ? `
                        <div style="margin-top: var(--space-4); padding-top: var(--space-3); border-top: 1px solid var(--color-border);">
                            <h3 style="font-family: var(--font-serif); font-size: 20px; font-weight: 700; color: var(--color-text-primary); margin: 0 0 var(--space-2) 0;">Recent Status Updates</h3>
                            <div style="display: flex; flex-direction: column; gap: var(--space-2);">
                                ${getStatusUpdates().slice(0, 10).map(update => {
                                    const statusClass = {
                                        'Applied': 'status-badge-applied',
                                        'Rejected': 'status-badge-rejected',
                                        'Selected': 'status-badge-selected',
                                        'Not Applied': 'status-badge-not-applied'
                                    }[update.status] || 'status-badge-not-applied';
                                    
                                    return `
                                        <div style="display: flex; justify-content: space-between; align-items: center; padding: var(--space-2); background-color: var(--color-hover); border-radius: 4px;">
                                            <div>
                                                <p style="font-weight: 600; color: var(--color-text-primary); margin: 0 0 4px 0;">${update.jobTitle}</p>
                                                <p style="font-size: 13px; color: var(--color-text-secondary); margin: 0;">${update.jobCompany}</p>
                                            </div>
                                            <div style="text-align: right;">
                                                <span class="status-badge ${statusClass}">${update.status}</span>
                                                <p style="font-size: 12px; color: var(--color-text-tertiary); margin: var(--space-1) 0 0 0;">${update.timestamp}</p>
                                            </div>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                        ` : ''}

                        <!-- Action Buttons -->
                        <div style="display: flex; gap: var(--space-2); margin-top: var(--space-4);">
                            <button class="btn btn-primary" onclick="copyDigestToClipboard(${JSON.stringify(digest).replace(/"/g, '&quot;')})" style="flex: 1;">Copy to Clipboard</button>
                            <button class="btn btn-secondary" onclick="createEmailDraft(${JSON.stringify(digest).replace(/"/g, '&quot;')})" style="flex: 1;">Send via Email</button>
                        </div>

                        <!-- Regenerate Button -->
                        <button class="btn btn-secondary" onclick="regenerateDigest()" style="width: 100%; margin-top: var(--space-2);">Regenerate Digest</button>
                    </div>
                </div>
            `;
        }

        function regenerateDigest() {
            const today = getTodayDate();
            const key = `jobTrackerDigest_${today}`;
            localStorage.removeItem(key);
            renderPage('/digest');
        }

        function renderSettingsPage() {
            const prefs = getPreferences();
            const locations = getUniqueValues('location').sort();

            const roleKeywords = prefs?.roleKeywords ? prefs.roleKeywords.join(', ') : '';
            const preferredLocations = prefs?.preferredLocations || [];
            const preferredMode = prefs?.preferredMode || [];
            const experienceLevel = prefs?.experienceLevel || '';
            const skills = prefs?.skills ? prefs.skills.join(', ') : '';
            const minMatchScore = prefs?.minMatchScore || 40;

            return `
                <div class="context-header">
                    <h1>Settings</h1>
                    <p class="context-header-subtext">Customize your job notification preferences for intelligent matching.</p>
                </div>
                <div style="padding: var(--space-4); max-width: 720px;">
                    <div style="background-color: var(--color-surface-white); border: 1px solid var(--color-border); border-radius: 4px; padding: var(--space-4);">
                        
                        <div class="form-group">
                            <label class="form-label">Role Keywords</label>
                            <input type="text" id="roleKeywords" value="${roleKeywords}" placeholder="e.g. Senior Developer, Frontend, React">
                            <span class="form-help">Comma-separated keywords that will be matched against job titles and descriptions.</span>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Preferred Locations</label>
                            <div style="display: flex; flex-direction: column; gap: var(--space-1); max-height: 200px; overflow-y: auto; border: 1px solid var(--color-border); border-radius: 4px; padding: var(--space-2); background-color: var(--color-background);">
                                ${locations.map(loc => `
                                    <label style="display: flex; align-items: center; gap: var(--space-1); cursor: pointer; font-weight: normal; margin: 0;">
                                        <input type="checkbox" class="location-checkbox" value="${loc}" ${preferredLocations.includes(loc) ? 'checked' : ''} style="cursor: pointer;">
                                        <span>${loc}</span>
                                    </label>
                                `).join('')}
                            </div>
                            <span class="form-help">Choose one or more locations where you want to work.</span>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Work Mode</label>
                            <div style="display: flex; gap: var(--space-3); margin-top: var(--space-2);">
                                <label style="display: flex; align-items: center; gap: var(--space-1); cursor: pointer; font-weight: normal;">
                                    <input type="checkbox" class="mode-checkbox" value="Remote" ${preferredMode.includes('Remote') ? 'checked' : ''} style="cursor: pointer;">
                                    <span>Remote</span>
                                </label>
                                <label style="display: flex; align-items: center; gap: var(--space-1); cursor: pointer; font-weight: normal;">
                                    <input type="checkbox" class="mode-checkbox" value="Hybrid" ${preferredMode.includes('Hybrid') ? 'checked' : ''} style="cursor: pointer;">
                                    <span>Hybrid</span>
                                </label>
                                <label style="display: flex; align-items: center; gap: var(--space-1); cursor: pointer; font-weight: normal;">
                                    <input type="checkbox" class="mode-checkbox" value="Onsite" ${preferredMode.includes('Onsite') ? 'checked' : ''} style="cursor: pointer;">
                                    <span>Onsite</span>
                                </label>
                            </div>
                            <span class="form-help">Select the work arrangements you prefer.</span>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Experience Level</label>
                            <select id="experienceLevel" style="cursor: pointer;">
                                <option value="">No preference</option>
                                <option value="Fresher" ${experienceLevel === 'Fresher' ? 'selected' : ''}>Fresher</option>
                                <option value="0-1" ${experienceLevel === '0-1' ? 'selected' : ''}>0-1 years</option>
                                <option value="1-3" ${experienceLevel === '1-3' ? 'selected' : ''}>1-3 years</option>
                                <option value="3-5" ${experienceLevel === '3-5' ? 'selected' : ''}>3-5 years</option>
                            </select>
                            <span class="form-help">Select your career level for better matches.</span>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Skills</label>
                            <input type="text" id="skills" value="${skills}" placeholder="e.g. React, JavaScript, Python, SQL">
                            <span class="form-help">Comma-separated list of skills you have.</span>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Minimum Match Score</label>
                            <div style="display: flex; gap: var(--space-2); align-items: center;">
                                <input type="range" id="minMatchScore" min="0" max="100" value="${minMatchScore}" style="flex: 1;">
                                <span style="font-weight: 600; color: var(--color-accent); min-width: 40px; text-align: right;">${minMatchScore}</span>
                            </div>
                            <span class="form-help">Only show jobs matching this score or higher.</span>
                        </div>

                        <button class="btn btn-primary" style="width: 100%; margin-top: var(--space-4);" onclick="savePreferencesForm()">Save Preferences</button>
                    </div>
                </div>
            `;
        }

        function savePreferencesForm() {
            const roleKeywords = document.getElementById('roleKeywords')?.value || '';
            const locationCheckboxes = document.querySelectorAll('.location-checkbox:checked');
            const preferredLocations = Array.from(locationCheckboxes).map(cb => cb.value);
            const modeCheckboxes = document.querySelectorAll('.mode-checkbox:checked');
            const preferredMode = Array.from(modeCheckboxes).map(cb => cb.value);
            const experienceLevel = document.getElementById('experienceLevel')?.value || '';
            const skills = document.getElementById('skills')?.value || '';
            const minMatchScore = parseInt(document.getElementById('minMatchScore')?.value || '40') || 40;

            const prefs = {
                roleKeywords,
                preferredLocations,
                preferredMode,
                experienceLevel,
                skills,
                minMatchScore
            };

            savePreferences(prefs);
            alert('✓ Preferences saved successfully!');
        }

        function renderProofPage() {
            return `
                <div class="context-header">
                    <h1>Proof</h1>
                    <p class="context-header-subtext">Artifact collection and progress tracking.</p>
                </div>
            `;
        }

        function renderPage(path) {
            const app = document.getElementById('app');
            const hamburger = document.getElementById('hamburger');
            const mobileMenu = document.getElementById('mobileMenu');
            const modal = document.getElementById('jobModal');

            // Close modal when navigating
            if (modal.classList.contains('active')) {
                modal.classList.remove('active');
            }

            // Normalize path for file:// protocol  
            const knownRoutes = ['/dashboard', '/saved', '/digest', '/settings', '/proof'];
            let normalizedPath = '/';
            
            // Check if any known route is in the pathname
            for (let route of knownRoutes) {
                if (path.includes(route)) {
                    normalizedPath = route;
                    break;
                }
            }

            // Close mobile menu when navigating
            if (mobileMenu.classList.contains('active')) {
                hamburger.classList.remove('active');
                mobileMenu.classList.remove('active');
            }

            let content = '';
            let pageTitle = 'Job Notification Tracker';

            // Route handling
            switch (normalizedPath) {
                case '/':
                    pageTitle = 'Home | Job Notification Tracker';
                    content = renderHomePage();
                    break;
                case '/dashboard':
                    pageTitle = 'Dashboard | Job Notification Tracker';
                    content = renderDashboardPage();
                    break;
                case '/saved':
                    pageTitle = 'Saved | Job Notification Tracker';
                    content = renderSavedPage();
                    break;
                case '/digest':
                    pageTitle = 'Digest | Job Notification Tracker';
                    content = renderDigestPage();
                    break;
                case '/settings':
                    pageTitle = 'Settings | Job Notification Tracker';
                    content = renderSettingsPage();
                    break;
                case '/proof':
                    pageTitle = 'Proof | Job Notification Tracker';
                    content = renderProofPage();
                    break;
                default:
                    pageTitle = 'Page Not Found | Job Notification Tracker';
                    content = `
                        <div class="context-header">
                            <h1>Page Not Found</h1>
                            <p class="context-header-subtext">The page you are looking for does not exist.</p>
                        </div>
                    `;
            }

            // Update page title
            document.title = pageTitle;

            // Update active nav link
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
            });

            // Set active link for current route
            if (normalizedPath !== '/') {
                document.querySelectorAll('.nav-link').forEach(link => {
                    if (link.getAttribute('href') === normalizedPath) {
                        link.classList.add('active');
                    }
                });
            }

            // Render page content
            app.innerHTML = content;
        }

        // ==========================================
        // EVENT LISTENERS
        // ==========================================

        document.addEventListener('click', (event) => {
            const target = event.target.closest('a[href^="/"]');
            if (target) {
                event.preventDefault();
                const path = target.getAttribute('href');
                window.history.pushState(null, '', path);
                renderPage(path);
            }

            // Close modal when clicking outside
            const modal = document.getElementById('jobModal');
            if (modal && modal.classList.contains('active') && event.target === modal) {
                modal.classList.remove('active');
            }
        });

        document.getElementById('hamburger').addEventListener('click', () => {
            const hamburger = document.getElementById('hamburger');
            const mobileMenu = document.getElementById('mobileMenu');
            hamburger.classList.toggle('active');
            mobileMenu.classList.toggle('active');
        });

        // Handle browser back/forward buttons
        window.addEventListener('popstate', () => {
            const path = window.location.pathname || '/';
            renderPage(path);
        });

        // Initial page load
        function init() {
            const path = window.location.pathname || '/';
            renderPage(path);
        }

        // Initialize on load
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
